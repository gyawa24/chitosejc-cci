<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>千歳JC AI例会 クイズ演習</title>
    <style>
        :root {
            --primary: #003366;
            --accent: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f7f9;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 1.1rem; color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin: 0 0 15px 0; }
        .progress { font-size: 0.85rem; color: #888; text-align: right; margin-bottom: 10px; }
        .question-box { font-size: 1.15rem; font-weight: bold; margin-bottom: 20px; line-height: 1.5; min-height: 4em; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { 
            background: #fff; border: 2px solid #e0e0e0; padding: 16px; border-radius: 12px; cursor: pointer; 
            text-align: left; font-size: 1rem; transition: 0.2s; -webkit-appearance: none;
        }
        .option-btn:active { background-color: #f8f9fa; transform: scale(0.98); }
        .option-btn.correct { background-color: #e6ffed; border-color: var(--success); color: #1e4620; }
        .option-btn.wrong { background-color: #fff5f5; border-color: var(--danger); color: #4b1111; }
        .hint-box { background: #fff9e6; border: 1px solid #ffeeba; padding: 12px; border-radius: 10px; margin-top: 15px; font-size: 0.85rem; color: #856404; display: none; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; font-size: 0.9rem; border-left: 5px solid transparent; }
        #next-btn { 
            width: 100%; background: var(--primary); color: #fff; border: none; padding: 16px; 
            border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-top: 20px; display: none; box-shadow: 0 4px 0 #002244;
        }
        #next-btn:active { transform: translateY(2px); box-shadow: none; }
        #result-screen { text-align: center; display: none; padding: 20px 0; }
        .score { font-size: 4.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .restart-btn { padding: 15px 40px; border-radius: 10px; border: none; background: #666; color: #fff; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>千歳JC AI例会クイズ</h1></header>
    <div id="quiz-screen">
        <div class="progress" id="progress">1 / 10</div>
        <div class="question-box" id="question"></div>
        <div class="options" id="options"></div>
        <div id="hint-box" class="hint-box"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn">次の問題へ ➔</button>
    </div>
    <div id="result-screen">
        <h2>演習終了！</h2>
        <p>あなたの正解数は...</p>
        <div class="score" id="final-score">0</div>
        <p id="eval-msg" style="font-weight:bold; margin-bottom:25px;"></p>
        <button class="restart-btn" onclick="location.reload()">別の問題に挑戦！</button>
    </div>
</div>

<script>
const bank = {
    jc: [
        { q: "米田理事長は第何代の理事長？", o: ["61代", "62代", "63代", "64代"], a: 2, r: "第63代です！", h: "千歳JCの歩みは1962年から続いています。" },
        { q: "千歳空港開港100年。大正15年(1926年)10月22日に完成したのは？", o: ["着陸場", "ターミナルビル", "管制塔", "滑走路"], a: 0, r: "市民の手で「着陸場」が作られたのが始まりです！", h: "当時は重機もなく、人力で作られました。" },
        { q: "4月例会は何月何日？", o: ["4月7日", "4月8日", "4月9日(木)", "4月10日"], a: 2, r: "4月9日(木)です。全員出席しましょう！", h: "木曜日の開催です。" },
        { q: "千歳市の「市の鳥」に指定されているのは？", o: ["タンチョウ", "ヤマセミ", "カッコウ", "シジュウカラ"], a: 1, r: "ヤマセミです。千歳川などで見ることができます。", h: "白と黒の鹿の子模様が特徴の鳥です。" },
        { q: "千歳市の「市の木」に指定されているのは？", o: ["サクラ", "シラカバ", "ナナカマド", "イチイ"], a: 1, r: "シラカバです。北海道らしい爽やかな木ですね。", h: "白い幹が特徴的です。" },
        { q: "千歳市の「市の花」に指定されているのは？", o: ["サクラ", "スズラン", "ラベンダー", "ヒマワリ"], a: 0, r: "サクラです。青葉公園の桜も綺麗ですね。", h: "春を代表する花です。" },
        { q: "日本青年会議所（日本JC）の三信条は「奉仕」「修練」とあと一つは？", o: ["協力", "友情", "誠実", "平和"], a: 1, r: "正解は「友情」です。JC活動の醍醐味ですね！", h: "JCIの基本理念の一つです。" },
        { q: "千歳JCの設立された西暦は何年？", o: ["1952年", "1962年", "1972年", "1982年"], a: 1, r: "1962年（昭和37年）です。", h: "今の理事長の代数から計算してみましょう。" }
    ],
    easy: [
        { q: "AIに指示を出すための命令文のことを何と呼ぶ？", o: ["コマンド", "プロンプト", "キーワード", "スクリプト"], a: 1, r: "プロンプト（Prompt）と呼びます。", h: "「促す」という意味を持つ言葉です。" },
        { q: "AIに「経営者のように答えて」と役割を与えることを何と呼ぶ？", o: ["なりきり設定", "ロール・プロンプティング", "アバター設定", "ポジション指定"], a: 1, r: "ロールプレイ（役割設定）をさせる手法です。", h: "「役割」を英語で言うと？" },
        { q: "AIが事実とは異なることを話す現象（ハルシネーション）の別名は？", o: ["バグ", "幻覚", "エラー", "ミス"], a: 1, r: "ハルシネーションは日本語で「幻覚」という意味です。", h: "まるで夢を見ているかのような状態です。" },
        { q: "ChatGPTを開発している会社はどこ？", o: ["Google", "Apple", "OpenAI", "Microsoft"], a: 2, r: "OpenAI社です。サム・アルトマン氏がCEOを務めています。", h: "「開かれたAI」という意味の社名です。" },
        { q: "Googleが開発している最新のAIの名前は？", o: ["ChatGPT", "Gemini", "Claude", "Llama"], a: 1, r: "Gemini（ジェミニ）です。スマホアプリでも使えます。", h: "「ふたご座」という意味の名前です。" }
    ],
    mid: [
        { q: "AIに回答の例を1つだけ見せてから答えさせる手法を何と呼ぶ？", o: ["Zero-Shot", "One-Shot", "Few-Shot", "Multi-Shot"], a: 1, r: "例が1つなので「One-Shot」と呼びます。", h: "「1つ」を英語で言うと？" },
        { q: "「まずステップバイステップで考えて」と指示し、論理的に考えさせる手法は？", o: ["Chain-of-Thought", "Direct-Thinking", "Logi-Pass", "Reasoning"], a: 0, r: "Chain-of-Thought（思考の連鎖）により、複雑な問題の正解率が上がります。", h: "思考を「鎖」のように繋げます。" },
        { q: "画像生成AIで「描いてほしくない要素」を指定するプロンプトは？", o: ["NGプロンプト", "ネガティブ・プロンプト", "デリート・リスト", "禁止ワード"], a: 1, r: "ネガティブ・プロンプトです。「余分な指」などを防ぐのに使われます。", h: "「消極的・否定的」という意味の英単語です。" },
        { q: "AIが出す情報の「ランダム性・創造性」を調整する設定値は？", o: ["Speed", "Token", "Temperature", "Volume"], a: 2, r: "Temperature（温度）です。高いと自由な回答、低いと確実な回答になります。", h: "「熱い」とアイデアが飛び出します。" }
    ],
    hard: [
        { q: "AIに一度に全てをやらせず、複数の指示をリレーのように繋げる手法は？", o: ["プロンプト・チェイニング", "プロンプト・フロー", "プロンプト・リレー", "工程管理"], a: 0, r: "チェイニング（Chaining）により、非常に精度の高い成果物が作れます。", h: "鎖（チェーン）にする、という意味です。" },
        { q: "AIのセキュリティで「外部に漏らしたくないデータ」を扱う際の鉄則は？", o: ["パスワードを言う", "匿名化・ダミー化する", "夜中に使う", "気にせず入力する"], a: 1, r: "名前や企業秘密をダミー（例：千歳 太郎 → 会員A）に置き換えるのが基本です。", h: "AIに教えてもいい状態に加工しましょう。" },
        { q: "AIが一度に扱える情報の長さの単位を何と呼ぶ？", o: ["ワード", "バイト", "トークン", "ビット"], a: 2, r: "トークン（Token）です。これを超えると古い内容を忘れてしまいます。", h: "「しるし・代用貨幣」などの意味がある言葉です。" }
    ]
};

const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

// 最終的なクイズセットを作成（10問）
let quizSet = [
    ...shuffle(bank.jc).slice(0, 3),    // JC・千歳から3問
    ...shuffle(bank.easy).slice(0, 4),  // 初級AIから4問
    ...shuffle(bank.mid).slice(0, 2),   // 中級AIから2問
    ...shuffle(bank.hard).slice(0, 1)   // 上級AIから1問
];

let current = 0, score = 0;
const qEl = document.getElementById('question'), optEl = document.getElementById('options');
const fbEl = document.getElementById('feedback'), hintEl = document.getElementById('hint-box');
const nextBtn = document.getElementById('next-btn'), progEl = document.getElementById('progress');

function render() {
    const data = quizSet[current];
    progEl.innerText = `${current + 1} / 10`;
    qEl.innerText = data.q;
    optEl.innerHTML = '';
    fbEl.style.display = nextBtn.style.display = 'none';
    hintEl.innerHTML = `<strong>💡 ヒント:</strong> ${data.h}`;
    hintEl.style.display = 'block';

    data.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => select(i);
        optEl.appendChild(btn);
    });
}

function select(idx) {
    const data = quizSet[current], btns = optEl.getElementsByClassName('option-btn');
    for (let b of btns) b.disabled = true;
    
    if (idx === data.a) {
        btns[idx].classList.add('correct');
        fbEl.innerHTML = `<strong>⭕ 正解！</strong><br>${data.r}`;
        fbEl.style.borderLeftColor = "var(--success)";
        score++;
    } else {
        btns[idx].classList.add('wrong');
        btns[data.a].classList.add('correct');
        fbEl.innerHTML = `<strong>❌ 残念...</strong><br>正解は「${data.o[data.a]}」でした。<br>${data.r}`;
        fbEl.style.borderLeftColor = "var(--danger)";
    }
    fbEl.style.display = 'block';
    nextBtn.style.display = 'block';
    hintEl.style.display = 'none';
}

nextBtn.onclick = () => {
    current++;
    if (current < 10) render();
    else {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        let msg = "";
        if(score === 10) msg = "完璧です！千歳のAIマスターはあなたです！";
        else if(score >= 8) msg = "素晴らしい！AIを駆使して千歳を盛り上げましょう！";
        else if(score >= 5) msg = "ナイス！AIの可能性を感じていただけたでしょうか？";
        else msg = "伸びしろ抜群！AIと一緒にどんどん試していきましょう！";
        document.getElementById('eval-msg').innerText = msg;
    }
};

render();
</script>
</body>
</html>
